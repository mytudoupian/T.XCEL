name: Email Auto Reply

on:
  repository_dispatch:
    types: [auto_reply]
  schedule:
    - cron: "0 0 1 * *"   # 每月1号UTC 00:00自动保活
  workflow_dispatch:

jobs:
  reply:
    # 只在“外部触发”或“手动触发”时运行，不影响保活
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行自动回复脚本
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RSA_PUBLICKEY: ${{ secrets.RSA_PUBLICKEY }}
          RSA_PRIVATEKEY2: ${{ secrets.RSA_PRIVATEKEY2 }}
        run: python main.py

  keepalive:
    # 只在定时触发（每月1号）时运行，防止仓库休眠
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 自动保活提交
        run: |
          git config user.name "Auto Keepalive Bot"
          git config user.email "bot@keepalive.local"
          git commit --allow-empty -m "chore: keep repository active [skip ci]"
          git push
