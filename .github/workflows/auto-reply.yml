name: Email Auto Reply

on:
  repository_dispatch:          # 必须有这个触发器
    types: [auto_reply]         # 这个名称必须与 cron-job.org 里 Body 的 event_type 一致
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行自动回复脚本
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py
